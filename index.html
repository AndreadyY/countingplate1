<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数数盘子吧</title>
    <style>
        :root { --red: #ef4444; --slate: #1e293b; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 140px; }
        
        .header { background: white; padding: 12px 15px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title { font-weight: 900; color: var(--slate); font-size: 18px; }
        .controls-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
        
        .tgl-btn { border: none; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tgl-on { background: #dcfce7; color: #166534; }
        .tgl-off { background: #f1f5f9; color: #94a3b8; }
        .manage-btn { background: var(--slate); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: bold; }

        .card { background: white; margin: 10px; padding: 15px; border-radius: 18px; display: flex; align-items: center; border: 1px solid #f1f5f9; }
        .plate-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
        .info { flex: 1; margin-left: 12px; }
        .name { font-weight: bold; color: #334155; }
        .price-tag { color: #94a3b8; font-size: 12px; }
        .counter { display: flex; align-items: center; background: #f8fafc; border-radius: 99px; padding: 3px; border: 1px solid #f1f5f9; }
        .btn { width: 34px; height: 34px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px; border-top: 1px solid #e2e8f0; border-radius: 20px 20px 0 0; box-shadow: 0 -8px 20px rgba(0,0,0,0.05); z-index: 100; }
        .total-money { font-size: 32px; font-weight: 900; color: var(--slate); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; padding: 20px; }
        .modal-content { background: white; border-radius: 24px; max-height: 85vh; overflow-y: auto; padding: 20px; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 15px; font-size: 24px; color: #cbd5e1; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #94a3b8; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .action-btn { background: var(--slate); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
        
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .del-btn { background: #fee2e2; color: #ef4444; border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <div class="title">🍣 数数盘子吧</div>
            <button class="manage-btn" onclick="openModal('manage')">⚙️ 管理碟子</button>
        </div>
        <div class="controls-row">
            <button id="feeBtn" class="tgl-btn tgl-on" onclick="toggleFee()">服务费:开</button>
            <button id="calBtn" class="tgl-btn tgl-on" onclick="toggleCal()">卡路里:显</button>
            <button class="tgl-btn tgl-off" onclick="resetCounts()">清空统计</button>
        </div>
    </div>

    <div id="plateList"></div>

    <div class="footer" onclick="openModal('receipt')">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span id="calText" style="color:#f97316; font-size:12px; font-weight:bold;">🔥 0 kcal</span>
            <span style="color:#94a3b8; font-size:11px;">点击查看清单 📋</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div>
                <div id="taxLabel" style="font-size:10px; color:#94a3b8; font-weight:bold;">总计 (含服务费)</div>
                <div id="totalPrice" class="total-money">$0.0</div>
            </div>
            <div style="background:#f1f5f9; border-radius:99px; padding:3px; display:flex; align-items:center;" onclick="event.stopPropagation()">
                <button class="btn" style="width:28px; height:28px; font-size:14px; background:white;" onclick="updatePeople(-1)">-</button>
                <span id="peopleVal" style="padding:0 10px; font-weight:bold; font-size:13px; color:var(--slate)">1人</span>
                <button class="btn" style="width:28px; height:28px; font-size:14px; background:white;" onclick="updatePeople(1)">+</button>
            </div>
        </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('manageModal')">×</span>
            <h3 style="margin-top:0">添加/删除碟子</h3>
            
            <div style="background:#f8fafc; padding:15px; border-radius:15px; margin-bottom:20px;">
                <div class="input-group">
                    <label>碟子名称</label>
                    <input type="text" id="newName" placeholder="如：极上蓝盘">
                </div>
                <div class="input-group">
                    <label>价格 ($)</label>
                    <input type="number" id="newPrice" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>颜色</label>
                    <input type="color" id="newColor" value="#3b82f6" style="height:40px; padding:2px;">
                </div>
                <button class="action-btn" onclick="addNewPlate()">保存新碟子</button>
            </div>

            <label style="font-size:11px; font-weight:bold; color:#94a3b8;">现有碟子列表 (点击删除)</label>
            <div id="manageList"></div>
        </div>
    </div>

    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('receiptModal')">×</span>
            <h3 style="margin-top:0">消费明细</h3>
            <div id="receiptList"></div>
            <div id="receiptTotal" style="margin-top:20px; padding-top:15px; border-top:2px solid #f1f5f9; font-weight:bold; display:flex; justify-content:space-between;">
                <span>小计:</span><span id="subText">$0</span>
            </div>
        </div>
    </div>

    <script>
        let plates = JSON.parse(localStorage.getItem('sushi_plates')) || [
            { id: 1, name: '红盘', price: 12, cals: 120, color: '#ef4444', count: 0 },
            { id: 2, name: '银盘', price: 17, cals: 150, color: '#94a3b8', count: 0 },
            { id: 3, name: '金盘', price: 22, cals: 180, color: '#fbbf24', count: 0 }
        ];
        let useFee = true, showCal = true, people = 1;

        function render() {
            // 渲染主页面
            document.getElementById('plateList').innerHTML = plates.map(p => `
                <div class="card">
                    <div class="plate-dot" style="background:${p.color}"></div>
                    <div class="info">
                        <div class="name">${p.name}</div>
                        <div class="price-tag">$${p.price} ${showCal ? '· 🔥'+p.cals+'kcal' : ''}</div>
                    </div>
                    <div class="counter">
                        <button class="btn" style="background:white; color:#cbd5e1" onclick="update(${p.id}, -1)">-</button>
                        <div style="width:30px; text-align:center; font-weight:bold;">${p.count}</div>
                        <button class="btn" style="background:${p.color}; color:white" onclick="update(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            // 渲染管理列表（带删除按钮）
            document.getElementById('manageList').innerHTML = plates.map(p => `
                <div class="manage-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:12px; height:12px; border-radius:50%; background:${p.color}"></div>
                        <span style="font-size:13px; font-weight:bold;">${p.name} ($${p.price})</span>
                    </div>
                    <button class="del-btn" onclick="deletePlate(${p.id})">删除</button>
                </div>
            `).join('');

            // 计算逻辑
            let sub = plates.reduce((s, p) => s + (p.price * p.count), 0);
            let cals = plates.reduce((s, p) => s + (p.cals * p.count), 0);
            let final = useFee ? sub * 1.1 : sub;
            
            document.getElementById('totalPrice').innerText = '$' + (final / people).toFixed(1);
            document.getElementById('calText').innerText = showCal ? `🔥 摄入总量: ${cals} kcal` : '';
            document.getElementById('subText').innerText = '$' + sub;
            document.getElementById('taxLabel').innerText = useFee ? '总计 (含服务费)' : '总计 (免服务费)';
            
            localStorage.setItem('sushi_plates', JSON.stringify(plates));
        }

        function update(id, d) { 
            plates.find(x => x.id === id).count = Math.max(0, plates.find(x => x.id === id).count + d); 
            render(); 
        }

        function updatePeople(d) { 
            people = Math.max(1, people + d); 
            document.getElementById('peopleVal').innerText = people + '人'; 
            render(); 
        }

        function toggleFee() { 
            useFee = !useFee; 
            document.getElementById('feeBtn').className = `tgl-btn ${useFee ? 'tgl-on' : 'tgl-off'}`;
            document.getElementById('feeBtn').innerText = `服务费:${useFee ? '开' : '关'}`;
            render(); 
        }

        function toggleCal() { 
            showCal = !showCal; 
            document.getElementById('calBtn').className = `tgl-btn ${showCal ? 'tgl-on' : 'tgl-off'}`;
            document.getElementById('calBtn').innerText = `卡路里:${showCal ? '显' : '隐'}`;
            render(); 
        }

        function addNewPlate() {
            const name = document.getElementById('newName').value;
            const price = document.getElementById('newPrice').value;
            const color = document.getElementById('newColor').value;
            if(!name || !price) return alert('请填写名称和价格');
            plates.push({ id: Date.now(), name, price: Number(price), cals: 150, color, count: 0 });
            render();
            document.getElementById('newName').value = '';
            document.getElementById('newPrice').value = '';
        }

        function deletePlate(id) {
            if(confirm('确定要彻底删除这个碟子吗？')) {
                plates = plates.filter(p => p.id !== id);
                render();
            }
        }

        function resetCounts() {
            if(confirm('重置所有数据？')) {
                plates.forEach(p => p.count = 0);
                people = 1;
                document.getElementById('peopleVal').innerText = '1人';
                render();
            }
        }

        function openModal(t) {
            if(t === 'manage') {
                document.getElementById('manageModal').style.display = 'block';
            } else {
                const eaten = plates.filter(p => p.count > 0);
                document.getElementById('receiptList').innerHTML = eaten.length ? eaten.map(p => `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #f1f5f9;">
                        <span>${p.name} × ${p.count}</span>
                        <span style="font-weight:bold">$${p.price * p.count}</span>
                    </div>
                `).join('') : '<div style="padding:20px; color:#cbd5e1; text-align:center;">还没有开始吃呢~</div>';
                document.getElementById('receiptModal').style.display = 'block';
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寿司助手-全功能版</title>
    <style>
        :root { --red: #ef4444; --slate: #1e293b; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 120px; }
        
        /* Header */
        .header { background: white; padding: 12px 15px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title { font-weight: 900; color: var(--slate); font-size: 18px; }
        .controls-row { display: flex; gap: 8px; }
        
        /* Toggle Buttons */
        .tgl-btn { border: none; padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tgl-on { background: #dcfce7; color: #166534; }
        .tgl-off { background: #f1f5f9; color: #94a3b8; }
        .manage-btn { background: var(--slate); color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; }

        /* List Area */
        .card { background: white; margin: 10px; padding: 15px; border-radius: 18px; display: flex; align-items: center; border: 1px solid #f1f5f9; }
        .plate-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
        .info { flex: 1; margin-left: 12px; }
        .name { font-weight: bold; color: #334155; }
        .price-tag { color: #94a3b8; font-size: 12px; }
        .counter { display: flex; align-items: center; background: #f8fafc; border-radius: 99px; padding: 3px; border: 1px solid #f1f5f9; }
        .btn { width: 34px; height: 34px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Floating Footer */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px; border-top: 1px solid #e2e8f0; border-radius: 20px 20px 0 0; box-shadow: 0 -8px 20px rgba(0,0,0,0.05); z-index: 100; }
        .summary-bar { display: flex; justify-content: space-between; align-items: flex-end; }
        .total-money { font-size: 32px; font-weight: 900; color: var(--slate); letter-spacing: -1px; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; padding: 20px; }
        .modal-content { background: white; border-radius: 24px; max-height: 80vh; overflow-y: auto; padding: 20px; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 15px; font-size: 24px; color: #cbd5e1; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #94a3b8; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .action-btn { background: var(--slate); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; }
        
        .receipt-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #f1f5f9; align-items: center; }
        .cal-input { width: 70px; padding: 5px; border: 1px solid #e2e8f0; border-radius: 6px; text-align: center; font-size: 13px; font-weight: bold; color: #f97316; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <div class="title">🍣 寿司助手 Pro</div>
            <button class="manage-btn" onclick="openModal('manage')">＋添加碟子</button>
        </div>
        <div class="controls-row">
            <button id="feeBtn" class="tgl-btn tgl-on" onclick="toggleFee()">服务费(10%):开</button>
            <button id="calBtn" class="tgl-btn tgl-on" onclick="toggleCal()">卡路里:显</button>
            <button class="tgl-btn tgl-off" style="margin-left:auto" onclick="resetCounts()">重置</button>
        </div>
    </div>

    <div id="plateList"></div>

    <div class="footer" onclick="openModal('receipt')">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span id="calText" style="color:#f97316; font-size:12px; font-weight:bold;">🔥 0 kcal</span>
            <span style="color:#94a3b8; font-size:11px;">点击查看清单 📋</span>
        </div>
        <div class="summary-bar">
            <div>
                <div id="taxLabel" style="font-size:10px; color:#94a3b8; font-weight:bold;">总计 (含服务费)</div>
                <div id="totalPrice" class="total-money">$0.0</div>
            </div>
            <div style="background:#f1f5f9; border-radius:99px; padding:3px; display:flex; align-items:center;" onclick="event.stopPropagation()">
                <button class="btn" style="width:28px; height:28px; font-size:14px; background:white;" onclick="updatePeople(-1)">-</button>
                <span id="peopleVal" style="padding:0 10px; font-weight:bold; font-size:13px; color:var(--slate)">1人</span>
                <button class="btn" style="width:28px; height:28px; font-size:14px; background:white;" onclick="updatePeople(1)">+</button>
            </div>
        </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('manageModal')">×</span>
            <h3 style="margin-top:0">管理新碟子</h3>
            <div class="input-group">
                <label>碟子名称</label>
                <input type="text" id="newName" placeholder="如：特级蓝盘">
            </div>
            <div class="input-group">
                <label>价格 ($)</label>
                <input type="number" id="newPrice" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>颜色</label>
                <input type="color" id="newColor" value="#3b82f6" style="height:44px; padding:2px;">
            </div>
            <button class="action-btn" onclick="addNewPlate()">保存到列表</button>
        </div>
    </div>

    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('receiptModal')">×</span>
            <h3 style="margin-top:0">消费清单 (可改卡路里)</h3>
            <div id="receiptList"></div>
            <div style="margin-top:20px; padding-top:15px; border-top:2px solid #f1f5f9; display:flex; justify-content:space-between; font-weight:bold;">
                <span>小计:</span>
                <span id="subtotalText">$0</span>
            </div>
        </div>
    </div>

    <script>
        let plates = JSON.parse(localStorage.getItem('sushi_plates')) || [
            { id: 1, name: '红盘', price: 12, cals: 120, color: '#ef4444', count: 0 },
            { id: 2, name: '银盘', price: 17, cals: 150, color: '#94a3b8', count: 0 },
            { id: 3, name: '金盘', price: 22, cals: 180, color: '#fbbf24', count: 0 }
        ];
        let useFee = true;
        let showCal = true;
        let people = 1;

        function render() {
            const list = document.getElementById('plateList');
            list.innerHTML = plates.map(p => `
                <div class="card">
                    <div class="plate-dot" style="background:${p.color}"></div>
                    <div class="info">
                        <div class="name">${p.name}</div>
                        <div class="price-tag">$${p.price} ${showCal ? '· 🔥'+p.cals+'kcal' : ''}</div>
                    </div>
                    <div class="counter">
                        <button class="btn" style="background:white; color:#cbd5e1" onclick="update(${p.id}, -1)">-</button>
                        <div style="width:30px; text-align:center; font-weight:bold; color:var(--slate)">${p.count}</div>
                        <button class="btn" style="background:${p.color}; color:white" onclick="update(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            let subtotal = plates.reduce((s, p) => s + (p.price * p.count), 0);
            let totalCals = plates.reduce((s, p) => s + (p.cals * p.count), 0);
            let final = useFee ? subtotal * 1.1 : subtotal;
            
            document.getElementById('totalPrice').innerText = '$' + (final / people).toFixed(1);
            document.getElementById('calText').innerText = showCal ? `🔥 摄入总量: ${totalCals} kcal` : '';
            document.getElementById('calText').style.visibility = showCal ? 'visible' : 'hidden';
            document.getElementById('subtotalText').innerText = '$' + subtotal;
            document.getElementById('taxLabel').innerText = useFee ? '总计 (含10%服务费)' : '总计 (免服务费)';
            
            localStorage.setItem('sushi_plates', JSON.stringify(plates));
        }

        function update(id, delta) {
            const p = plates.find(x => x.id === id);
            p.count = Math.max(0, p.count + delta);
            render();
        }

        function updatePeople(delta) {
            people = Math.max(1, people + delta);
            document.getElementById('peopleVal').innerText = people + '人';
            render();
        }

        function toggleFee() {
            useFee = !useFee;
            const btn = document.getElementById('feeBtn');
            btn.innerText = `服务费(10%):${useFee ? '开' : '关'}`;
            btn.className = `tgl-btn ${useFee ? 'tgl-on' : 'tgl-off'}`;
            render();
        }

        function toggleCal() {
            showCal = !showCal;
            const btn = document.getElementById('calBtn');
            btn.innerText = `卡路里:${showCal ? '显' : '隐'}`;
            btn.className = `tgl-btn ${showCal ? 'tgl-on' : 'tgl-off'}`;
            render();
        }

        function resetCounts() {
            if(confirm('清空今日碟子数？')) {
                plates.forEach(p => p.count = 0);
                people = 1;
                document.getElementById('peopleVal').innerText = '1人';
                render();
            }
        }

        function openModal(type) {
            if(type === 'manage') {
                document.getElementById('manageModal').style.display = 'block';
            } else {
                const rList = document.getElementById('receiptList');
                const eaten = plates.filter(p => p.count > 0);
                rList.innerHTML = eaten.length ? eaten.map(p => `
                    <div class="receipt-item">
                        <div>
                            <div style="font-weight:bold;">${p.name}</div>
                            <div style="font-size:11px; color:#94a3b8">$${p.price} × ${p.count}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:5px;">
                            <input type="number" class="cal-input" value="${p.cals}" onchange="updateCal(${p.id}, this.value)">
                            <span style="font-size:10px; color:#94a3b8;">kcal/碟</span>
                        </div>
                    </div>
                `).join('') : '<div style="padding:30px; text-align:center; color:#cbd5e1">暂无消费数据</div>';
                document.getElementById('receiptModal').style.display = 'block';
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateCal(id, val) {
            plates.find(x => x.id === id).cals = Number(val);
            render();
        }

        function addNewPlate() {
            const name = document.getElementById('newName').value;
            const price = document.getElementById('newPrice').value;
            const color = document.getElementById('newColor').value;
            if(!name || !price) return alert('信息不完整');
            plates.push({ id: Date.now(), name, price: Number(price), cals: 150, color, count: 0 });
            render();
            closeModal('manageModal');
        }

        render();
    </script>
</body>
</html>

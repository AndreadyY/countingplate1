<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寿司计算器 - 旗舰版</title>
    
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/babel-standalone/6.26.0/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; }
        .plate-btn:active { transform: scale(0.9); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const DEFAULT_PLATES = [
            { id: 1, name: '红盘', price: 12, calories: 120, color: 'bg-red-500', count: 0 },
            { id: 2, name: '银盘', price: 17, calories: 150, color: 'bg-slate-300', count: 0 },
            { id: 3, name: '金盘', price: 22, calories: 180, color: 'bg-yellow-400', count: 0 },
            { id: 4, name: '黑盘', price: 27, calories: 200, color: 'bg-slate-900', count: 0 },
            { id: 5, name: '特选', price: 32, calories: 250, color: 'bg-indigo-600', count: 0 },
        ];

        function App() {
            const [plates, setPlates] = useState(DEFAULT_PLATES);
            const [people, setPeople] = useState(1);
            const [isServiceTax, setIsServiceTax] = useState(true);
            const [showCals, setShowCals] = useState(true);

            const totals = useMemo(() => {
                const subtotal = plates.reduce((s, p) => s + (p.price * p.count), 0);
                const calories = plates.reduce((s, p) => s + (p.calories * p.count), 0);
                const tax = isServiceTax ? subtotal * 0.1 : 0;
                const final = subtotal + tax;
                return { final, calories, perPerson: final / people };
            }, [plates, people, isServiceTax]);

            const update = (id, delta) => {
                setPlates(ps => ps.map(p => p.id === id ? {...p, count: Math.max(0, p.count + delta)} : p));
            };

            return (
                <div className="min-h-screen pb-48">
                    {/* 顶部设置栏 */}
                    <div className="bg-white p-4 shadow-sm sticky top-0 z-20 flex justify-between items-center border-b">
                        <h1 className="font-black text-xl text-slate-800">🍣 寿司计算器</h1>
                        <div className="flex gap-2 text-xs font-bold">
                            <button onClick={() => setIsServiceTax(!isServiceTax)} className={`px-2 py-1 rounded ${isServiceTax ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-400'}`}>
                                10%服务费: {isServiceTax ? '开' : '关'}
                            </button>
                            <button onClick={() => setShowCals(!showCals)} className={`px-2 py-1 rounded ${showCals ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`}>
                                卡路里: {showCals ? '显' : '隐'}
                            </button>
                        </div>
                    </div>

                    {/* 列表区 */}
                    <div className="p-4 space-y-4">
                        {plates.map(p => (
                            <div key={p.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className={`w-12 h-12 rounded-full shadow-inner ${p.color}`}></div>
                                    <div>
                                        <div className="font-bold text-slate-700">{p.name}</div>
                                        <div className="text-sm text-slate-400">
                                            ${p.price} {showCals && <span className="ml-2 text-orange-300">🔥{p.calories}kcal</span>}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-50 rounded-full p-1 border">
                                    <button onClick={() => update(p.id, -1)} className="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center text-xl plate-btn">-</button>
                                    <span className="font-bold w-4 text-center">{p.count}</span>
                                    <button onClick={() => update(p.id, 1)} className="w-10 h-10 bg-slate-800 text-white rounded-full shadow-sm flex items-center justify-center text-xl plate-btn">+</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 底部结算面板 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white p-6 border-t shadow-[0_-10px_30px_rgba(0,0,0,0.05)] rounded-t-3xl z-30">
                        <div className="flex justify-between items-end mb-4">
                            <div>
                                <div className="text-xs text-slate-400 font-bold mb-1 uppercase tracking-widest">
                                    {people > 1 ? `每人应付 (共${people}人)` : '总计金额'}
                                </div>
                                <div className="text-4xl font-black text-slate-900 font-mono tracking-tighter">
                                    ${totals.perPerson.toFixed(1)}
                                </div>
                            </div>
                            <div className="flex items-center bg-slate-100 rounded-full p-1">
                                <button onClick={() => setPeople(Math.max(1, people - 1))} className="w-8 h-8 bg-white rounded-full shadow-sm flex items-center justify-center">👤-</button>
                                <span className="px-3 font-bold text-slate-600">{people}</span>
                                <button onClick={() => setPeople(people + 1)} className="w-8 h-8 bg-white rounded-full shadow-sm flex items-center justify-center">👤+</button>
                            </div>
                        </div>
                        {showCals && <div className="text-xs text-orange-500 font-bold mb-4">本餐摄入总量: {totals.calories} kcal</div>}
                        <button onClick={() => {if(confirm('重置所有盘数？')) setPlates(ps => ps.map(p=>({...p, count:0})))}} className="w-full bg-slate-100 text-slate-400 py-3 rounded-xl font-bold text-sm">
                            重置数据
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
